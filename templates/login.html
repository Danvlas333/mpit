<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Jarvis Study</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --page-bg: #e9edf6;
            --card-bg: rgba(255, 255, 255, 0.93);
            --text-main: #151515;
            --text-muted: #9a9a9a;
            --field-bg: #f7f7f7;
            --field-border: rgba(111, 159, 199, 0.14);
            --button-bg: #6f9fc7;
            --button-hover: #668fb3;
            --button-shadow: rgba(111, 159, 199, 0.24);
            --error-text: #c76666;
            --success-text: #56a36d;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            font-family: "Segoe UI", Arial, sans-serif;
            background-color: var(--page-bg);
            background-image: url("login-background.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            color: var(--text-main);
        }

        .login-card {
            width: min(100%, 486px);
            min-height: 560px;
            padding: 30px 38px 18px;
            background: var(--card-bg);
            border-radius: 14px;
            box-shadow: 0 18px 48px rgba(105, 125, 154, 0.12);
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-wrap {
            width: 126px;
            height: 126px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .login-title {
            margin: 2px 0 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.01em;
        }

        .login-subtitle {
            margin: 12px 0 0;
            font-size: 15px;
            color: var(--text-muted);
            text-align: center;
        }

        .login-form {
            width: 100%;
            margin-top: 42px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .login-field {
            width: 100%;
            height: 52px;
            padding: 0 28px;
            border: 1px solid var(--field-border);
            border-radius: 999px;
            background: var(--field-bg);
            color: #4b4b4b;
            font-size: 15px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .login-field::placeholder {
            color: #c6c6c6;
        }

        .login-field:focus {
            outline: none;
            background: #ffffff;
            border-color: rgba(111, 159, 199, 0.48);
            box-shadow: 0 0 0 4px rgba(111, 159, 199, 0.12);
        }

        .form-status {
            width: 100%;
            min-height: 18px;
            margin-top: 2px;
            text-align: center;
            font-size: 13px;
            color: var(--error-text);
        }

        .form-status--success {
            color: var(--success-text);
        }

        .login-button {
            margin-top: 20px;
            min-width: 130px;
            height: 46px;
            padding: 0 38px;
            border: none;
            border-radius: 999px;
            background: var(--button-bg);
            color: #ffffff;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 12px 24px var(--button-shadow);
            transition: background-color 0.2s ease, transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
        }

        .login-button:hover {
            background: var(--button-hover);
            transform: translateY(-1px);
        }

        .login-button:disabled {
            opacity: 0.72;
            cursor: wait;
            transform: none;
            box-shadow: 0 8px 18px rgba(111, 159, 199, 0.16);
        }

        .card-footer {
            width: 100%;
            margin-top: auto;
            padding-top: 22px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .card-footer a {
            color: inherit;
            text-decoration: none;
        }

        .card-footer a:hover {
            color: #7f7f7f;
        }

        @media (max-width: 640px) {
            body {
                padding: 16px;
            }

            .login-card {
                min-height: 0;
                padding: 24px 22px 18px;
            }

            .login-title {
                font-size: 25px;
            }

            .login-form {
                margin-top: 32px;
            }
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="logo-wrap" aria-hidden="true">
            <img src="brand-logo.png" alt="">
        </div>

        <h1 class="login-title">Jarvis study</h1>
        <p class="login-subtitle">Войдите, чтобы продолжить обучение</p>

        <form id="login-form" class="login-form">
            <input id="username" class="login-field" type="text" placeholder="Логин" autocomplete="username" required>
            <input id="password" class="login-field" type="password" placeholder="Пароль" autocomplete="current-password" required>

            <div id="form-status" class="form-status" aria-live="polite"></div>

            <button id="login-button" type="submit" class="login-button">Войти</button>
        </form>

        <div class="card-footer">
            <a href="#">Забыли пароль?</a>
        </div>
    </main>

    <script>
        const loginForm = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const loginButton = document.getElementById("login-button");
        const formStatus = document.getElementById("form-status");

        function setStatus(message, tone = "") {
            formStatus.textContent = message;
            formStatus.className = `form-status${tone ? ` form-status--${tone}` : ""}`;
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const username = usernameInput.value.trim();
            const password = passwordInput.value;

            if (!username || !password) {
                setStatus("Введите логин и пароль.");
                return;
            }

            loginButton.disabled = true;
            setStatus("");

            try {
                const response = await fetch("/api/login", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ username, password })
                });

                const payload = await response.json();
                if (!response.ok || !(payload.ok || payload.success)) {
                    throw new Error(payload.error || "Не удалось войти.");
                }

                setStatus("Вход выполнен. Перенаправляем...", "success");
                window.location.href = payload.redirect || "/dashboard";
            } catch (error) {
                setStatus(error.message || "Ошибка входа.");
            } finally {
                loginButton.disabled = false;
            }
        });
    </script>
</body>
</html>
